<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in and Sign up</title>
</head>
<body>

        <div id="root">
            
        </div>

        <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<script type="text/babel">
    function LoginForm() {
        const [username, setUsername] = React.useState('');
        const [password, setPassword] = React.useState('');

        function handleSubmit(event) {
            event.preventDefault();
            alert(`Username: ${username}\nPassword: ${password}`);

        }
        

        return (
  
            


        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', marginTop: '50px' }}>
            <h1>hello ,welcome to my website </h1>

            <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', width: '300px', margin: '0 auto' }}>

                <input 
                
                    type="text" 
                    placeholder="Username" 
                    value={username} 
                    onChange={(e) => setUsername(e.target.value)} 
                    style={{ marginBottom: '10px', padding: '8px' }}
                />

                <input 
                    type="password" 

                    placeholder="Password" 
                    value={password} 
                    onChange={(e) => setPassword(e.target.value)} 
                    style={{ marginBottom: '10px', padding: '8px' }}
                />

                <button type="submit" style={{ padding: '10px', backgroundColor: '#007BFF', color: 'white', border: 'none', borderRadius: '5px' }}>

                    Log In
                </button>
            </form>
        </div>
            
        );
    }

    ReactDOM.render(<LoginForm />, document.getElementById('root'));



</script>
    
</body>
</html>
