<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container">
        
    </div>
   <script src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"></script>
<!-- this for react for browser and  mobile external library -->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
<!-- this is react specifice eternal library -->
<!-- this is react-dom specifice eternal library -->
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script> 
<!--      1. This for javaScript compiler
          2. Bable translate jsx to Javascript   -->
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
<!-- tell the bable to translate jsx to javascript for the browser -->
    <script type="text/babel">
      let  shppingConst= 5;
      let productCost=10;
      let totalCost=productCost + shppingConst;

        
      const element = <div>

        <p>Product cost ${productCost}</p>
        <p>shipping cost ${shppingConst}</p>
        <p>Total cost ${totalCost}</p>
        <button>place order</button> 
    
        </div>
      

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(element);

    //   ReactDOM.createRoot(productprice).render(productCost);

    </script>
  </body>
