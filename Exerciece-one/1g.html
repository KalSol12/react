<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container">
        
    </div>
   <!-- <script src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"></script> -->
<!-- this for react for browser and  mobile external library -->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
<!-- this is react specifice eternal library -->
<!-- this is react-dom specifice eternal library -->
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script> 
<!--      1. This for javaScript compiler
          2. Bable translate jsx to Javascript   -->
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
<!-- tell the bable to translate jsx to javascript for the browser -->
 <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script type="text/babel">
        let time=dayjs().format('MMMM D');
        // console.log(time);
   

        
      const element = <div>
        <p>Today is {time}</p>

    
        </div>
      

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(element);

    </script>
  </body>
</html>
