<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <!-- React -->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/Chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">

      function ChatInput({messages,setChatMessage}) {
        const [inputText,setinputText]=React.useState('');
        function saveInputText(event) {
      setinputText(event.target.value)
          
        }
        function sendText(params) {
          const newChatMessage=[
          ...messages,
          {
            message:inputText,
            sender:"user",
            key:crypto.randomUUID()
          }
        ];
          
            setChatMessage(newChatMessage);
       const response= Chatbot.getResponse(inputText);
       setChatMessage([
          ...newChatMessage,
          {
            message:response,
            sender:"robot",
            key:crypto.randomUUID()
          }
        ])
        setinputText('');
          
        }
        return (
          <>
            <input type="text" 
            placeholder="Message for chatbot" size='30'
            onChange={saveInputText}
            value={inputText}
            onKeyDown={(e)=>{
                if (e.key==="Enter"){
                  sendText();
                }
                else if(e.key==="Escape"){
                  setinputText('');
                }
            }}
             />
            <button onClick={sendText}>Send</button>
          </>
        );
      }

      function ChatMessage({ message, sender }) {
        return (
          <div>
            {sender === "robot" && (
              <img src="robot.png" alt="Robot" width="50" />
            )}

            {message}

            {sender === "user" && (
              <img src="user.png" alt="User" width="50" />
            )}
          </div>
        ); 

      }

      function ChatComponent({messages}) {
     
        // const [messages,setChatMessage]=arry;
        // const messages= arry[0];
        // const setChatMessage=arry[1];
  
      
    return ( 
            <>
          

               {messages.map((msg,index) => (
                <ChatMessage
              
                message={msg.message}
                sender={msg.sender}
                key={index}

                 />
                ))}
            </>
            )
        
      }

   
      function App() {
         const [messages,setChatMessage]=  React.useState([
          { message: "Hello", sender: "user" ,key:"id1"},
          { message: "I am great!!!", sender: "robot",key:"id2" },
          { message: "How are you?", sender: "user",key:"id3" },
          { message: "I am fine 😊", sender: "robot", key:"id4" }
        ]);
       

        return (
          <>
            <ChatInput 
            messages={messages} 
            setChatMessage={setChatMessage}
            />

            <ChatComponent messages={messages}/>

          </>
        );
      }

      const container = document.querySelector(".js-container");
      const root = ReactDOM.createRoot(container);
      root.render(<App />);

    </script>
  </body>
</html>
