<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
    <style>
        body {
          font-family: Arial, sans-serif;
          background-color: #f9f9f9;
          padding: 20px;
          margin: 0;
          
        }
      .send-button {
        margin-left: 10px;
        background-color: rgb(23, 123, 84);
        color: white;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 5px;
        font-size: 16px;

      }
      .send-button:disabled {
        background-color: rgb(200, 200, 200);
        cursor: not-allowed;
      }
      .input-field {
        padding: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
        border-width: 1px;
        border-radius: 10px;
        flex-grow: 1;

      }
      .chat-container {
       max-width: 600px;
        margin: auto;
        /* border: 1px solid #ccc; */


        
        
      }
      .chat-input-container {
        display: flex;
        margin-bottom: 20px;
      }
      .chat-message.user {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        margin-bottom: 10px;
      }
      .chat-message.robot {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        margin-bottom: 10px;
      }
      .message-content {
        max-width: 300px;
        padding: 10px;
        border-radius: 10px;
        background-color: #f1f1f1;
        margin: 0 10px;
      }
      .chat-message.user .message-content {
        background-color: rgb(23, 123, 84);
        color: white;
      }
      .message-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
      }
      .chat-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        border: 1px solid #ccc;
        padding: 10px;
      }
      .chat-messages-container {
        flex-grow: 1;
        overflow-y: scroll;
        scrollbar-width: none;

        /* margin-bottom: 10px; */
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <!-- React -->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/Chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">

      function ChatInput({messages,setChatMessage,isLoading,setIsLoading}) {
        const [inputText,setinputText]=React.useState('');
        function saveInputText(event) {
      setinputText(event.target.value)
          
        }
        async function sendText() {
            if (!inputText.trim()) return;
            // ❌ prevent sending while loading
            if (isLoading) return;
            // ❌ prevent sending while loading
       
          const newChatMessage=[
          ...messages,
          {
            message:inputText,
            sender:"user",
            key:crypto.randomUUID()
          }
        ];
          
            setChatMessage(newChatMessage);
           setinputText('');

        // ✅ start loading
          setIsLoading(true);

       const response= await Chatbot.getResponseAsync(inputText);
       setChatMessage([
          ...newChatMessage,
          {
            message:response,
            sender:"robot",
            key:crypto.randomUUID()
          }
        ])
        // ✅ stop loading
         setIsLoading(false);
          
        }
        return (
          <div className="chat-input-container">
            <input type="text" 
            placeholder="Message for chatbot" size='30'
            onChange={saveInputText}
            value={inputText}
            disabled={isLoading}
            className={"input-field"}
            onKeyDown={(e)=>{
                if (e.key==="Enter"){
                  sendText();
                }
                else if(e.key==="Escape"){
                  setinputText('');
                }
            }}
             />
            <button onClick={sendText}
            disabled={isLoading || !inputText.trim()}
            className={"send-button "}
            
            >Send</button>
          </div>
        );
      }

      function ChatMessage({ message, sender,isLoading }) {
        return (
          <div className={`chat-message ${sender}`}>
            {sender === "robot" && (
              <img src="robot.png" alt="Robot" className="message-avatar" />
            )}
          <div className="message-content">
            {message}
            </div>

            {sender === "user" && (
              <img src="user.png" alt="User" className="message-avatar" />
            )}
          </div>
        ); 

      }

      function ChatComponent({messages,isLoading}) {
     
        // const [messages,setChatMessage]=arry;
        // const messages= arry[0];
        // const setChatMessage=arry[1];
        const chatContainerRef= React.useRef(null);
        React.useEffect(() => {
         const container = chatContainerRef.current;
          if (container) {
            container.scrollTop = container.scrollHeight;
          }

         
        },[messages]);
  
      
    return ( 
            <div className="chat-messages-container" ref={chatContainerRef}>
          

               {messages.map((msg,index) => (
                <ChatMessage
              
                message={msg.message}
                sender={msg.sender}
                key={index}
    
    />
                ))}
                   {isLoading && (
        <div>
          <img src="robot.png" width="50" />
          <i>Typing...</i>
        </div>
      )}
            </div>
            );
        
      }

   
      function App() {
         const [messages,setChatMessage]=  React.useState([
          { message: "Hello", sender: "user" ,key:"id1"},
          { message: "I am great!!!", sender: "robot",key:"id2" },
          { message: "How are you?", sender: "user",key:"id3" },
          { message: "I am fine 😊", sender: "robot", key:"id4" }
        ]);
        const [isLoading, setIsLoading] = React.useState(false);
       

        return (
          <div className="chat-container">

           

            <ChatComponent  messages={messages}
                            isLoading={isLoading}
            />
             <ChatInput 
            messages={messages} 
            setChatMessage={setChatMessage}
            isLoading={isLoading}
            setIsLoading={setIsLoading}
            />

          </div>
        );
      }

      const container = document.querySelector(".js-container");
      const root = ReactDOM.createRoot(container);
      root.render(<App />);

    </script>
  </body>
</html>
