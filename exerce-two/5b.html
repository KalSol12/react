<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container">
        
    </div>
   <script src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"></script>
<!-- this for react for browser and  mobile external library -->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
<!-- this is react specifice eternal library -->
<!-- this is react-dom specifice eternal library -->
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script> 
<!--      1. This for javaScript compiler
          2. Bable translate jsx to Javascript   -->
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
<!-- tell the bable to translate jsx to javascript for the browser -->
    <script type="text/babel">
        function App(params) {
            return(
              <>
                  <ProductDtail productname="cotton socks" price="10"/> 
                  <ProductDtail productname="Table Tennins" price="30"/> 
                  <ProductDtail productname="plain T-T-shirt" price="20"/> 
              </>

           
        )
        }
        function ProductDtail({productname,price}) {
          return(
             <>
              <p>{productname}</p>
              <p> price ${price}</p>
              <button>Add to Cart</button>
            </>
             
          )
            
            
        }
       
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);

    </script>
  </body>
</html>
